name: Deploy Backend to AWS

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy_backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.EC2_SSH_KEY }}
          known_hosts: ${{ secrets.EC2_HOST }}
          if_key_exists: replace

      - name: Create SSH Config
        run: |
          mkdir -p ~/.ssh
          echo "Host ec2" >> ~/.ssh/config
          echo "  HostName ${{ secrets.EC2_HOST }}" >> ~/.ssh/config
          echo "  User ${{ secrets.EC2_USERNAME }}" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy Backend
        run: |
          ssh ec2 << 'EOF'
            cd ~/NexTrade
            git pull origin main
            docker compose up -d --build backend
            docker system prune -f
            
            # Run the database patch safely
            echo "Running DB migration..."
            docker exec nextrade-backend-1 python -c "
from sqlalchemy import text
from backend.db.postgres import engine
with engine.connect() as conn:
    conn.execute(text('ALTER TABLE stock_profiles ADD COLUMN IF NOT EXISTS revenue FLOAT;'))
    conn.execute(text('ALTER TABLE stock_profiles ADD COLUMN IF NOT EXISTS net_income FLOAT;'))
    conn.execute(text('CREATE TABLE IF NOT EXISTS stock_financials (id SERIAL PRIMARY KEY, symbol VARCHAR(10), period_label VARCHAR(20), date TIMESTAMP, revenue FLOAT, net_income FLOAT, is_quarterly BOOLEAN DEFAULT TRUE);'))
    conn.execute(text('CREATE INDEX IF NOT EXISTS idx_stock_financials_symbol ON stock_financials(symbol);'))
    conn.commit()
print('✓ Database patched!')"
          EOF
