name: Deploy Backend to AWS

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy_backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USERNAME }}
        run: |
          # 1. Create the .pem file from the secret
          echo "$SSH_KEY" > deploy_key.pem
          chmod 600 deploy_key.pem
          
          # 2. Run the deployment commands directly
          ssh -i deploy_key.pem -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST << 'EOF'
            cd ~/NexTrade
            git pull origin main
            # Using the new 'docker compose' (no hyphen) since it worked manually
            docker compose up -d --build backend
            docker system prune -f
          EOF
