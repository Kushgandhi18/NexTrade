name: Deploy Backend to AWS

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy_backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.EC2_SSH_KEY }}
          known_hosts: |
            github.com ssh-rsa 
          config: |
            Host ec2
              HostName ${{ secrets.EC2_HOST }}
              User ${{ secrets.EC2_USERNAME }}
              IdentityFile ~/.ssh/id_rsa
              StrictHostKeyChecking accept-new

      - name: Deploy Backend
        run: |
          ssh ec2 << 'EOF'
            cd ~/NexTrade
            git pull origin main
            docker compose up -d --build backend
            docker system prune -f
            echo "✓ Backend deployed successfully!"
            
            # Run the database patch for new columns
            echo "Running DB patch..."
            docker exec nextrade-backend-1 python -c "
from sqlalchemy import text
from backend.db.postgres import engine
with engine.connect() as conn:
    conn.execute(text('ALTER TABLE stock_profiles ADD COLUMN IF NOT EXISTS revenue FLOAT;'))
    conn.execute(text('ALTER TABLE stock_profiles ADD COLUMN IF NOT EXISTS net_income FLOAT;'))
    conn.commit()
print('✓ Database patched!')
            "
            
            docker ps | grep backend
          EOF

      - name: Deployment Success ✅
        run: echo "Backend deployed to ${{ secrets.EC2_HOST }} at $(date)"
