name: Deploy Backend to AWS

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy_backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH (Base64)
        env:
          SSH_KEY_B64: ${{ secrets.EC2_SSH_KEY_B64 }}
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USERNAME }}
        run: |
          # 1. Clean and Decode the base64 secret
          echo "Decoding SSH key..."
          echo "$SSH_KEY_B64" | tr -d '[:space:]' | base64 -d > deploy_key.pem
          
          # 2. Verify the key file
          echo "Key file size: $(wc -c < deploy_key.pem) bytes"
          echo "Key file format check:"
          head -1 deploy_key.pem
          tail -1 deploy_key.pem
          
          chmod 600 deploy_key.pem
          echo "Permissions set to 600"
          
          # 3. Verify key is valid before using
          ssh-keygen -l -f deploy_key.pem || { echo "ERROR: Invalid SSH key!"; exit 1; }
          
          # 4. Run the deployment commands
          ssh -i deploy_key.pem -o StrictHostKeyChecking=no -vvv $SSH_USER@$SSH_HOST << 'EOF'
            cd ~/NexTrade
            git pull origin main
            docker compose up -d --build backend
            docker system prune -f
            echo "✓ Backend deployed successfully!"
            docker ps | grep backend
          EOF

      - name: Deployment Success ✅
        run: echo "Backend deployed to ${{ secrets.EC2_HOST }} at $(date)"
