name: CI/CD — Stock Prediction

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t stock-prediction-api ./backend

      - name: Test image starts
        run: |
          docker run -d --name test-api -p 8000:8000 \
            -e DATABASE_URL=sqlite:///test.db \
            -e CACHE_ENABLED=false \
            stock-prediction-api
          sleep 5
          curl -f http://localhost:8000/health || (docker logs test-api && exit 1)
          docker stop test-api

  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: curl -fsSL https://railway.app/install.sh | sh
      - name: Deploy
        run: railway up --service stock-prediction-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
